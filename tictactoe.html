<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #333;
        }
        #gameBoard {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            margin: 20px auto;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #eee;
            display: flex;
;
            justify-content: center;
;
            align-items: center;
            font-size: 3em;
;
            cursor: pointer;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
        }
        #scoreBoard {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        
        <div id="scoreBoard">
            Player X Score: <span id="scoreX">0</span>
            | Player O Score: <span id="scoreO">0</span>
        </div>

        <div id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="resetButton">New Game</button>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const scoreXDisplay = document.getElementById('scoreX');
        const scoreODisplay = document.getElementById('scoreO');
        const resetButton = document.getElementById('resetButton');

        let gameState = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let isGameActive = true;
        let userScore = { X: 0, O: 0 };

        const winningConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        function handleCellClick(event) {
            const clickedCell = event.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== '' || !isGameActive) {
                return;
            }

            handlePlayerMove(clickedCellIndex);
        }

        function handlePlayerMove(index) {
            gameState[index] = currentPlayer;
            clickedCell.textContent = currentPlayer;

            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]];
                let b = gameState[winCondition[1]];
                let c = gameState[winCondition[2]];

                if (a !== '' && b !== '' && c !== '' && a === b && b === c) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                alert(`Player ${currentPlayer} has won!`);
                isGameActive = false;
                updateScore(currentPlayer);
                return;
            }

            let roundDraw = !gameState.includes('') && gameState.filter(cell => cell !== '').length === 9;
            if (roundDraw) {
                alert(`It's a Draw!`);
                isGameActive = false;
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            }
        }

        function updateScore(winner) {
            if (winner === 'X') {
                userScore.X++;
                scoreXDisplay.textContent = userScore.X;
            } else if (winner === 'O') {
                userScore.O++;
                scoreODisplay.textContent = userScore.O;
            }
        }

        function resetGame() {
            gameState = ['', '', '', '', '', '', '', '', ''];
            isGameActive = true;
            currentPlayer = 'X';
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('X', 'O');
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetButton.addEventListener('click', resetGame);

    </script>
</body>
</html>
